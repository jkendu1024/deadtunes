<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadTunes | 5-Star SBDs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
        .dead-gradient { background: linear-gradient(90deg, #ef4444, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-black text-gray-100 min-h-screen">

    <div id="player-container" class="sticky top-0 z-50 w-full bg-gray-900 border-b border-red-900 hidden">
        <div class="max-w-6xl mx-auto p-2 flex flex-col">
            <button onclick="closePlayer()" class="self-end text-xs text-gray-400 hover:text-white mb-1 uppercase">✕ Close</button>
            <div id="player-iframe"></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="flex flex-col items-center mb-12 gap-6 text-center">
            <img src="https://www.gratefuldeadshop.com/cdn/shop/files/SYF_Logo_700x.png" alt="Steal Your Face" class="w-32 h-32 md:w-48 md:h-48 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]">
            
            <div>
                <h1 class="text-6xl font-black italic dead-gradient tracking-tighter">DEADTUNES</h1>
                <p class="text-gray-400 font-medium font-mono text-sm uppercase tracking-widest mt-2">4 & 5 Star Soundboards Only</p>
                
                <div class="mt-4 flex flex-col items-center gap-1">
                    <p class="text-[10px] text-gray-600 uppercase tracking-widest">Total Travelers</p>
                    <img src="https://hitwebcounter.com/counter/counter.php?page=jkendu1024_deadtunes&style=0005&nbdigits=5&type=page&initCount=0" title="Free Counter" Alt="web counter" border="0" class="opacity-70 grayscale hover:grayscale-0 transition">
                </div>
            </div>

            <div class="flex gap-2 w-full max-w-md">
                <input type="text" id="searchInput" placeholder="Year or Venue (e.g. 1977)" 
                       class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 w-full focus:outline-none focus:border-red-500">
                <button onclick="fetchShows()" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-lg font-bold transition">Search</button>
            </div>
        </header>

        <div id="loading" class="flex flex-col items-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-red-500 mb-4"></div>
            <p class="text-gray-500 uppercase tracking-tighter">Searching the Vault...</p>
        </div>

        <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        async function fetchShows() {
            const searchTerm = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            const loading = document.getElementById('loading');
            
            loading.classList.remove('hidden');
            container.innerHTML = '';

            let query = 'collection:(GratefulDead) AND avg_rating:[4 TO 5] AND mediatype:(etree) AND subject:(soundboard)';
            if (searchTerm) query += ` AND (title:(${searchTerm}) OR year:(${searchTerm}) OR venue:(${searchTerm}))`;

            const baseUrl = "https://archive.org/advancedsearch.php";
            const params = new URLSearchParams({
                q: query,
                'fl[]': ['identifier', 'title', 'avg_rating', 'venue', 'date'],
                sort: 'date desc',
                rows: '45',
                output: 'json'
            });

            try {
                const response = await fetch(`${baseUrl}?${params.toString()}`);
                const data = await response.json();
                displayShows(data.response.docs);
            } catch (err) {
                loading.innerText = "Error accessing the Archive.org vault.";
            }
        }

        function displayShows(shows) {
            const container = document.getElementById('results');
            document.getElementById('loading').classList.add('hidden');

            if (shows.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-500 py-10 text-xl">No high-rated shows found.</p>';
                return;
            }

            container.innerHTML = shows.map(show => `
                <div class="glass p-6 rounded-2xl border border-gray-800 hover:border-red-600 transition-all flex flex-col justify-between shadow-2xl">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-red-500 font-bold font-mono">${show.date || ''}</span>
                            <span class="text-yellow-400 text-sm">★ ${show.avg_rating}</span>
                        </div>
                        <h3 class="font-bold text-lg leading-tight mb-2">${show.title}</h3>
                        <p class="text-gray-400 text-xs italic mb-6">${show.venue || 'Unknown Venue'}</p>
                    </div>
                    <button onclick="playShow('${show.identifier}')" 
                            class="w-full bg-blue-600 hover:bg-red-600 text-white font-bold py-2 rounded-lg transition uppercase text-sm">
                            Stream Now
                    </button>
                </div>
            `).join('');
        }

        function playShow(id) {
            const container = document.getElementById('player-container');
            const frame = document.getElementById('player-iframe');
            frame.innerHTML = `<iframe src="https://archive.org/embed/${id}&playlist=1" width="100%" height="120" frameborder="0"></iframe>`;
            container.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closePlayer() {
            document.getElementById('player-container').classList.add('hidden');
            document.getElementById('player-iframe').innerHTML = '';
        }

        fetchShows();
    </script>
</body>
</html>
