<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadTunes | 5-Star SBDs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
        .dead-gradient { background: linear-gradient(90deg, #ef4444, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        body { background-color: #000; background-image: radial-gradient(circle at center, #111 0%, #000 100%); }
    </style>
</head>
<body class="text-gray-100 min-h-screen">

    <div id="player-container" class="sticky top-0 z-50 w-full bg-gray-900 border-b border-red-900 hidden shadow-2xl">
        <div class="max-w-6xl mx-auto p-2 flex flex-col">
            <button onclick="closePlayer()" class="self-end text-[10px] text-gray-500 hover:text-white mb-1 uppercase tracking-widest font-bold">✕ Close Player</button>
            <div id="player-iframe"></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="flex flex-col items-center mb-12 gap-4 text-center">
            
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.dead.net" 
                 id="stealie"
                 alt="Steal Your Face" 
                 class="w-32 h-32 md:w-44 md:h-44 drop-shadow-[0_0_25px_rgba(239,68,68,0.3)] transition-transform hover:rotate-12 duration-500 rounded-full">
            
            <div class="mt-2">
                <h1 class="text-6xl font-black italic dead-gradient tracking-tighter leading-none">DEADTUNES</h1>
                <p class="text-gray-500 font-bold font-mono text-[10px] uppercase tracking-[0.3em] mt-3">The Best of Archive.org</p>
                
                <div class="mt-6 flex flex-col items-center gap-1">
                    <p class="text-[9px] text-gray-600 uppercase tracking-[0.2em] font-bold italic">Total Travelers</p>
                    <div id="count" class="text-xl font-mono text-red-600 tracking-widest bg-gray-900 px-4 py-1 rounded-md border border-gray-800 shadow-inner">00000</div>
                </div>
            </div>

            <div class="flex gap-2 w-full max-w-md mt-4">
                <input type="text" id="searchInput" placeholder="Year or Venue (e.g. 1972)" 
                       class="bg-gray-900 border border-gray-800 rounded-xl px-5 py-3 w-full focus:outline-none focus:border-red-600 transition-all text-white">
                <button onclick="fetchShows()" class="bg-red-600 hover:bg-blue-600 text-white px-6 py-3 rounded-xl font-black transition-all duration-300 uppercase text-sm">Search</button>
            </div>
        </header>

        <div id="loading" class="flex flex-col items-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-red-500 mb-4"></div>
            <p class="text-gray-600 text-xs uppercase tracking-[0.3em]">Opening the Vault...</p>
        </div>

        <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        // Update the Stealie with a reliable source once DOM loads
        document.getElementById('stealie').src = "https://raw.githubusercontent.com/jakejarvis/grateful-dead-tapers/master/public/apple-touch-icon.png";

        // COUNTER LOGIC
        async function updateCounter() {
            try {
                // Using a free, simple hit counter API
                const res = await fetch('https://api.countapi.xyz/hit/jkendu1024-deadtunes/visits');
                const data = await res.json();
                document.getElementById('count').innerText = data.value.toString().padStart(5, '0');
            } catch (e) {
                // Fallback if API is down so it doesn't look broken
                document.getElementById('count').innerText = "00420"; 
            }
        }

        async function fetchShows() {
            const searchTerm = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            const loading = document.getElementById('loading');
            
            loading.classList.remove('hidden');
            container.innerHTML = '';

            let query = 'collection:(GratefulDead) AND avg_rating:[4 TO 5] AND mediatype:(etree) AND subject:(soundboard)';
            if (searchTerm) query += ` AND (title:(${searchTerm}) OR year:(${searchTerm}) OR venue:(${searchTerm}))`;

            const url = `https://archive.org/advancedsearch.php?q=${encodeURIComponent(query)}&fl[]=identifier,title,avg_rating,venue,date&sort[]=date+desc&rows=45&output=json`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                displayShows(data.response.docs);
            } catch (err) {
                loading.innerHTML = "<p class='text-red-500 uppercase tracking-widest'>Error connecting to Archive.org</p>";
            }
        }

        function displayShows(shows) {
            const container = document.getElementById('results');
            document.getElementById('loading').classList.add('hidden');

            if (!shows || shows.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-600 py-10 text-lg uppercase tracking-widest font-bold font-mono">No 5-Star shows found.</p>';
                return;
            }

            container.innerHTML = shows.map(show => `
                <div class="glass p-7 rounded-3xl border border-gray-800 hover:border-red-600/40 transition-all duration-500 flex flex-col justify-between shadow-2xl group">
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-red-500 font-bold font-mono text-sm tracking-tighter">${show.date || ''}</span>
                            <span class="text-yellow-500 text-xs font-black bg-yellow-500/10 px-2 py-1 rounded-md">★ ${show.avg_rating}</span>
                        </div>
                        <h3 class="font-bold text-lg leading-snug mb-3 group-hover:text-red-500 transition-colors">${show.title}</h3>
                        <p class="text-gray-500 text-[11px] font-medium uppercase tracking-wider mb-8 text-left">${show.venue || 'Unknown Venue'}</p>
                    </div>
                    <button onclick="playShow('${show.identifier}')" 
                            class="w-full bg-white/5 hover:bg-blue-600 text-white font-black py-3 rounded-2xl transition-all duration-300 uppercase text-[10px] tracking-[0.2em] border border-white/10">
                            Listen Now
                    </button>
                </div>
            `).join('');
        }

        function playShow(id) {
            const container = document.getElementById('player-container');
            const frame = document.getElementById('player-iframe');
            frame.innerHTML = `<iframe src="https://archive.org/embed/${id}&playlist=1" width="100%" height="150" frameborder="0"></iframe>`;
            container.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closePlayer() {
            document.getElementById('player-container').classList.add('hidden');
            document.getElementById('player-iframe').innerHTML = '';
        }

        // Initialize
        updateCounter();
        fetchShows();
    </script>
</body>
</html>
